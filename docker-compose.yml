services:
  postgres:
    image: postgres:17
    container_name: personal-book-library-postgres
    environment:
      POSTGRES_DB: personal_book_library
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d personal_book_library"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
